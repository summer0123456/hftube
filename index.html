<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HF Tube — YouTube Clone</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg-elev: #1c1c1c;
    --bg-hover: #272727;
    --text: #f1f1f1;
    --text-dim: #aaa;
    --accent: #ff0000;
    --border: #303030;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Roboto", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
  }
  .logo-icon {
    background: var(--accent);
    color: #fff;
    width: 32px;
    height: 22px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .logo-icon::before {
    content: "";
    border-left: 8px solid #fff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }
  .search-wrap {
    flex: 1;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
  }
  .search-wrap input {
    flex: 1;
    padding: 10px 14px;
    background: #121212;
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 20px 0 0 20px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .search-wrap input:focus { border-color: #1c62b9; }
  .search-wrap button {
    padding: 0 20px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 0 20px 20px 0;
    color: var(--text);
    cursor: pointer;
  }
  .search-wrap button:hover { background: var(--bg-hover); }

  /* Layout */
  main { padding: 24px; max-width: 1800px; margin: 0 auto; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px 16px;
  }
  .card {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: transform 0.12s ease;
  }
  .card:hover { transform: translateY(-2px); }
  .thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  .thumb .placeholder {
    color: #555;
    font-size: 48px;
  }
  .meta {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    padding: 0 4px;
  }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff5252, #ff0000);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #fff;
    font-size: 14px;
  }
  .info { flex: 1; min-width: 0; }
  .title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
    margin: 0 0 4px;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .channel { font-size: 13px; color: var(--text-dim); margin: 0; }
  .stats   { font-size: 13px; color: var(--text-dim); margin: 0; }

  /* Load More Button */
  .show-more-wrap {
    text-align: center;
    margin-top: 40px;
    display: none;
  }
  .show-more-btn {
    padding: 10px 30px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .show-more-btn:hover { background: var(--bg-hover); }

  /* Status / loading */
  .status {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Player modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 32px 16px;
  }
  .modal.open { display: flex; }
  .modal-content {
    background: var(--bg);
    width: 100%;
    max-width: 1100px;
    border-radius: 12px;
    overflow: hidden;
  }
  .player-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }
  .player-wrap video {
    width: 100%;
    height: 100%;
  }
  .player-info {
    padding: 18px 20px 24px;
  }
  .player-info h1 {
    margin: 0 0 12px;
    font-size: 20px;
    line-height: 1.3;
  }
  .player-info .row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .player-info .channel-name { font-weight: 600; }
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    z-index: 1001;
  }
  .close-btn:hover { background: rgba(0,0,0,0.9); }

  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  footer a { color: #3ea6ff; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.reload()">
    <span class="logo-icon"></span>
    <span>HF Tube</span>
  </div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search videos..." />
    <button onclick="onSearch()">Search</button>
  </div>
</header>

<main>
  <div id="status" class="status">
    <div class="spinner"></div>
    <p>Loading videos from Hugging Face...</p>
  </div>
  
  <div id="grid" class="grid"></div>

  <!-- Show More Button -->
  <div id="showMoreWrap" class="show-more-wrap">
    <button class="show-more-btn" onclick="showMore()">Show More</button>
  </div>
</main>

<div id="modal" class="modal" onclick="closePlayerOnBackdrop(event)">
  <button class="close-btn" onclick="closePlayer()" title="Close (Esc)">×</button>
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="player-wrap">
      <video id="player" controls autoplay playsinline></video>
    </div>
    <div class="player-info">
      <h1 id="playerTitle"></h1>
      <div class="row">
        <div class="avatar" id="playerAvatar">S</div>
        <div>
          <div class="channel-name">summer01234</div>
          <div style="color: var(--text-dim); font-size: 13px;" id="playerSize"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  Source:
  <a href="https://huggingface.co/datasets/summer01234/yt" target="_blank">huggingface.co/datasets/summer01234/yt</a>
</footer>

<script>
  // ============== Config ==============
  const DATASET_USER  = "summer01234";
  const DATASET_REPO  = "yt";
  const THUMB_REPO    = "yt_t"; // Thumbnail dataset repository

  const API_BASE       = `https://huggingface.co/api/datasets/${DATASET_USER}/${DATASET_REPO}/tree/main`;
  const RESOLVE_BASE   = `https://huggingface.co/datasets/${DATASET_USER}/${DATASET_REPO}/resolve/main/`;
  const THUMB_RESOLVE  = `https://huggingface.co/datasets/${DATASET_USER}/${THUMB_REPO}/resolve/main/`;
  
  const VIDEO_EXTS     = [".mp4", ".webm", ".mov", ".mkv", ".ogv", ".m4v"];
  const VIDEOS_PER_PAGE = 8;

  let allVideos = [];
  let currentList = []; 
  let currentRenderedCount = 0; 

  // ============== Helpers ==============
  function isVideoFile(path) {
    const lower = path.toLowerCase();
    return VIDEO_EXTS.some(ext => lower.endsWith(ext));
  }

  function cleanTitle(path) {
    let title = path.replace(/\.[^.]+$/, "");
    title = title.replace(/^\d{10,}_/, "");
    title = title.replace(/\s*\[[A-Za-z0-9_-]{6,}\]\s*$/, "");
    title = title.replace(/[-_ ]?\d{4}-\d{2}-\d{2}$/, "");
    title = title.replace(/_/g, " ").replace(/\s+/g, " ").trim();
    return title || path;
  }

  function formatBytes(bytes) {
    if (!bytes) return "";
    const units = ["B", "KB", "MB", "GB"];
    let v = bytes, i = 0;
    while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
    return v.toFixed(v < 10 ? 1 : 0) + " " + units[i];
  }

  // ============== Fetch (with API pagination support) ==============
  async function fetchAllFiles() {
    const files = [];
    let cursor = null;

    for (let page = 0; page < 50; page++) { 
      const url = cursor
        ? `${API_BASE}?cursor=${encodeURIComponent(cursor)}`
        : API_BASE;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} fetching file list`);
      const batch = await res.json();
      if (!Array.isArray(batch) || batch.length === 0) break;
      files.push(...batch);

      const link = res.headers.get("link") || res.headers.get("Link");
      if (link) {
        const m = link.match(/<[^>]*[?&]cursor=([^&>]+)[^>]*>;\s*rel="next"/);
        if (m) { cursor = decodeURIComponent(m[1]); continue; }
      }
      break; 
    }
    return files;
  }

  // ============== Rendering (Pagination / Lazy Load Logic) ==============
  function renderBatch(reset = false) {
    const grid = document.getElementById("grid");
    const showMoreWrap = document.getElementById("showMoreWrap");

    if (reset) {
      grid.innerHTML = "";
      currentRenderedCount = 0;
    }

    if (currentList.length === 0) {
      grid.innerHTML = '<div class="status" style="grid-column: 1/-1;">No videos found.</div>';
      showMoreWrap.style.display = 'none';
      return;
    }

    const startIndex = currentRenderedCount;
    const endIndex = currentRenderedCount + VIDEOS_PER_PAGE;
    const videosToRender = currentList.slice(startIndex, endIndex);

    videosToRender.forEach(v => {
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => openPlayer(v);

      const initial = v.title.charAt(0).toUpperCase() || "V";
      const sizeStr = formatBytes(v.size);

      // We now load the jpg thumbnail using the <img> tag
      card.innerHTML = `
        <div class="thumb">
          <img
            src="${v.thumbUrl}"
            alt="${escapeHtml(v.title)}"
            loading="lazy"
            onerror="onThumbError(this)"
          />
        </div>
        <div class="meta">
          <div class="avatar">${initial}</div>
          <div class="info">
            <h3 class="title">${escapeHtml(v.title)}</h3>
            <p class="channel">summer01234</p>
            <p class="stats">${sizeStr}</p>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    currentRenderedCount += videosToRender.length;

    if (currentRenderedCount >= currentList.length) {
      showMoreWrap.style.display = 'none';
    } else {
      showMoreWrap.style.display = 'block';
    }
  }

  function showMore() {
    renderBatch(false); 
  }

  // Replace broken thumbnails with a generic placeholder icon
  function onThumbError(imgEl) {
    const wrap = imgEl.parentElement;
    imgEl.remove();
    wrap.innerHTML = '<div class="placeholder">▶</div>';
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  // ============== Player ==============
  function openPlayer(v) {
    const modal  = document.getElementById("modal");
    const player = document.getElementById("player");
    const title  = document.getElementById("playerTitle");
    const sizeEl = document.getElementById("playerSize");
    const av     = document.getElementById("playerAvatar");

    player.src = v.url;
    title.textContent = v.title;
    sizeEl.textContent = formatBytes(v.size);
    av.textContent = v.title.charAt(0).toUpperCase() || "V";
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closePlayer() {
    const modal  = document.getElementById("modal");
    const player = document.getElementById("player");
    player.pause();
    player.removeAttribute("src");
    player.load();
    modal.classList.remove("open");
    document.body.style.overflow = "";
  }

  function closePlayerOnBackdrop(e) {
    if (e.target.id === "modal") closePlayer();
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closePlayer();
  });

  // ============== Search ==============
  function onSearch() {
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    
    if (!q) {
      currentList = allVideos;
    } else {
      currentList = allVideos.filter(v => v.title.toLowerCase().includes(q));
    }
    
    renderBatch(true);
  }

  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") onSearch();
    if (e.key === "Escape") {
      e.target.value = "";
      onSearch(); 
    }
  });

  // ============== Init ==============
  (async function init() {
    const statusEl = document.getElementById("status");
    try {
      const files = await fetchAllFiles();
      const videoFiles = files.filter(f => f.type === "file" && isVideoFile(f.path));
      
      allVideos = videoFiles.map(f => {
        // Change the extension of the video file to .jpg for the thumbnail
        const thumbPath = f.path.replace(/\.[^.]+$/, ".jpg");

        return {
          path: f.path,
          title: cleanTitle(f.path),
          url: RESOLVE_BASE + encodeURIComponent(f.path),
          thumbUrl: THUMB_RESOLVE + encodeURIComponent(thumbPath), // Route to the thumbnail dataset
          size: f.size || (f.lfs && f.lfs.size) || 0,
        };
      });
      
      currentList = allVideos; 
      statusEl.style.display = "none";
      
      renderBatch(true); 

    } catch (err) {
      statusEl.innerHTML = `<p style="color:#ff6b6b;">Failed to load videos: ${escapeHtml(err.message)}</p>`;
    }
  })();
</script>

</body>
</html>
